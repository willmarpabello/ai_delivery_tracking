<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
        }
        .page-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }
        .top-back {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
        }
        .back-arrow {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid #e6e6e6;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #0b1f3a;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            transition: 0.2s ease;
        }
        .back-arrow:hover {
            transform: translateX(-3px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.15);
            color: #0d6efd;
        }
        .form-header {
            background: linear-gradient(135deg, #0b1f3a, #1e3a5f);
        }
        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #1e3a5f;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }
        .btn-submit {
            background: linear-gradient(135deg, #0d6efd, #1e88e5);
            border: none;
            box-shadow: 0 6px 18px rgba(13,110,253,0.18);
            transition: 0.2s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(13,110,253,0.25);
        }
    </style>
</head>
<body>

<div class="container page-wrapper py-5">
    <div class="card form-card w-100 mx-auto" style="max-width: 850px;">
        
        <div class="top-back">
            <a href="{% url 'dashboard' %}" class="back-arrow" title="Back to Dashboard">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
        </div>

        <div class="form-header text-white text-center py-4 px-3">
            <h4 class="mb-1 fw-semibold"><i class="bi bi-truck me-2 text-warning"></i>Create Delivery</h4>
            <small class="opacity-75 d-block">Assign customer, rider, and delivery destination</small>
        </div>

        <div class="card-body p-4 p-md-5">
            <div class="mx-auto" style="max-width: 520px;">
                
                <form method="POST">
                    {% csrf_token %}

                    <div class="section-title text-center mb-3">Assignment</div>

                    <div class="mb-4 text-center">
                        <label class="form-label fw-semibold text-dark small mb-2"><i class="bi bi-person-fill me-1"></i>Customer</label>
                        <select name="customer" class="form-select text-center rounded-3 py-2" required>
                            <option disabled selected>Select customer</option>
                            {% for c in customers %}
                                <option value="{{ c.id }}">{{ c.username }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4 text-center">
                        <label class="form-label fw-semibold text-dark small mb-2"><i class="bi bi-bicycle me-1"></i>Rider</label>
                        <select name="rider" class="form-select text-center rounded-3 py-2" required>
                            <option disabled selected>Select rider</option>
                            {% for r in riders %}
                                <option value="{{ r.id }}">{{ r.username }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="section-title text-center mb-3 mt-4">Delivery Info</div>

                    <div class="mb-4 text-center">
                        <label class="form-label fw-semibold text-dark small mb-2"><i class="bi bi-geo-alt-fill me-1"></i>Delivery Address</label>
                        <input type="text"
                               name="location"
                               class="form-control text-center rounded-3 py-2"
                               placeholder="House no, street, city, landmark"
                               required>
                        <div class="form-text text-muted small mt-2">
                            <i class="bi bi-info-circle me-1"></i>Used for GPS tracking and AI anomaly detection
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit btn-primary text-white w-100 rounded-3 py-2.5 fw-semibold mt-3">
                        <i class="bi bi-plus-circle me-2"></i>Create Delivery
                    </button>

                    <button type="reset" class="btn btn-outline-secondary w-100 rounded-3 py-2 small mt-2">
                        <i class="bi bi-arrow-counterclockwise me-1"></i>Reset Form
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
